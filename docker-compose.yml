services:
  rehat:
    build: .
    restart: always
    ports:
      - "8501:8501"
    volumes:
      - rehat_data:/data
    environment:
      - REHAT_PASSWORD=${REHAT_PASSWORD:-Rehat2026}
      - REHAT_DB_PATH=/data/rehat.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}

  scheduler:
    build: .
    restart: always
    volumes:
      - rehat_data:/data
    environment:
      - REHAT_DB_PATH=/data/rehat.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    command: python scheduler.py

volumes:
  rehat_data:
